name: SeriesDay Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

permissions:
  contents: write

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:

  scrape:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      # -------------------
      # SERIES
      # -------------------

      - name: Run Series Scraper
        run: node scraper-category.js

      - name: Commit Series
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true

          git add data/series

          if git diff --cached --quiet; then
            echo "No series changes"
          else
            git commit -m "update series"
            git push
          fi

      # -------------------
      # EPISODES
      # -------------------

      - name: Run Episodes Scraper
        run: node episodes.js

      - name: Commit Episodes
        run: |
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true

          git add data/episodes data/progress

          if git diff --cached --quiet; then
            echo "No episodes changes"
          else
            git commit -m "update episodes"
            git push
          fi

      # -------------------
      # PLAYERS
      # -------------------

      - name: Run Players Scraper
        run: node players.js

      - name: Commit Playlist
        run: |
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true

          git add data/playlist data/progress

          if git diff --cached --quiet; then
            echo "No playlist changes"
          else
            git commit -m "update playlist"
            git push
          fi        
