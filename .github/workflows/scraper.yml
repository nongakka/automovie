name: SeriesDay Scraper

on:
  workflow_dispatch:
  
permissions:
  contents: write
  actions: write

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:

  scrape-category:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        category:
          - chinese
          - korean
          - japanese
          - thai
          - new
          - y
          - western
          - netflix

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Run Category Scraper
        run: node scraper-category.js ${{ matrix.category }}

      - name: Run Episodes Scraper
        run: node episodes.js ${{ matrix.category }}
      
      - name: Run Players Scraper
        run: node players.js ${{ matrix.category }}

      - name: Upload Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ matrix.category }}
          path: data

  merge-data:

    needs: scrape-category
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4
     
      - name: Download All Data
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge Data
        run: |

          mkdir -p data/episodes
          mkdir -p data/series
          mkdir -p data/playlist
          mkdir -p data/progress

          cp -r artifacts/*/data/episodes/* data/episodes/ 2>/dev/null || true
          cp -r artifacts/*/data/series/* data/series/ 2>/dev/null || true
          cp -r artifacts/*/data/playlist/* data/playlist/ 2>/dev/null || true
          cp -r artifacts/*/data/progress/* data/progress/ 2>/dev/null || true

      - name: Commit Updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto update scraper data"
            git push
          fi

      - name: Re-run workflow before timeout
        run: |
          echo "Waiting before re-run..."
          sleep 21000
          gh workflow run "${{ github.workflow }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
