name: matrix Update

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:

  prepare:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:

      - uses: actions/checkout@v4

      - name: Generate Matrix
        id: set-matrix
        run: |

          MATRIX=$(node -e "
          const cats=require('./data/categories.json');
          console.log(JSON.stringify({
            category: cats.map(c=>c.slug)
          }));
          ")

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT


  update:

    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 355

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Update Categories
        run: node update-categories.js


      - name: Run Scraper
        id: scraper
        env:
          CATEGORY: ${{ matrix.category }}
        run: |

          echo "RUN CATEGORY: $CATEGORY"

          node update.js "$CATEGORY" | tee output.txt

          if grep -q "SCRAPER_STATUS:IN_PROGRESS" output.txt; then
            echo "continue=true" >> $GITHUB_OUTPUT
          else
            echo "continue=false" >> $GITHUB_OUTPUT
          fi


      - name: Commit Data
        run: |

          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"

          git add data/*.json || true

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update ${{ matrix.category }}"

            for i in {1..5}; do
              git pull --rebase origin main && git push && break
              sleep 5
            done
          fi


      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y


      - name: Trigger Next Run
        if: steps.scraper.outputs.continue == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run matrix.yml
