<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Anime Multi Category</title>

<style>
body { background:#111; color:#fff; font-family:Arial; margin:20px; }
select { padding:8px; margin-bottom:15px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:15px; }
.card { background:#222; padding:10px; border-radius:8px; cursor:pointer; }
.card img { width:100%; height:260px; object-fit:cover; }
.viewer { margin-top:20px; }
.episode-btn { 
  display:inline-block; 
  background:#333; 
  padding:6px 10px; 
  margin:4px; 
  border-radius:5px; 
  cursor:pointer; 
}
iframe { width:100%; height:500px; margin-top:15px; }
.back { margin:15px 0; cursor:pointer; color:#0af; }
</style>
</head>
<body>

<h1>Anime หลายหมวด</h1>

<select id="categorySelect"></select>

<div id="mainView">
  <div class="grid" id="grid"></div>
</div>

<div id="detailView" style="display:none;">
  <div class="back" onclick="goBack()">← กลับ</div>
  <h2 id="movieTitle"></h2>
  <div id="episodeList"></div>
  <div class="viewer">
    <iframe id="player" allowfullscreen></iframe>
  </div>
</div>

<script>

let categories = [];
let currentMovies = [];

async function loadCategories() {
  const res = await fetch("categories.json?v=" + Date.now());
  categories = await res.json();

  const select = document.getElementById("categorySelect");

  categories.forEach(cat => {
    select.innerHTML += `<option value="${cat.slug}">${cat.name}</option>`;
  });

  select.addEventListener("change", () => loadMovies(select.value));
  loadMovies(categories[0].slug);
}

async function loadMovies(slug) {
  const res = await fetch(`data/${slug}.json?v=` + Date.now());
  currentMovies = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  currentMovies.forEach((movie, index) => {
    grid.innerHTML += `
      <div class="card" onclick="showDetail(${index})">
        <img src="${movie.image}">
        <h3>${movie.title}</h3>
        <p>${movie.episodes.length} ตอน</p>
      </div>
    `;
  });

  document.getElementById("mainView").style.display = "block";
  document.getElementById("detailView").style.display = "none";
}

function showDetail(index) {

  const movie = currentMovies[index];

  document.getElementById("movieTitle").innerText = movie.title;

  const epList = document.getElementById("episodeList");
  epList.innerHTML = "";

  movie.episodes.forEach((ep, i) => {
    epList.innerHTML += `
      <span class="episode-btn" onclick="playEpisode(${index}, ${i})">
        ${ep.name}
      </span>
    `;
  });

  document.getElementById("mainView").style.display = "none";
  document.getElementById("detailView").style.display = "block";
}

function playEpisode(movieIndex, epIndex) {

  const ep = currentMovies[movieIndex].episodes[epIndex];

  if (ep.servers.length === 0) {
    alert("ไม่มี server");
    return;
  }

  document.getElementById("player").src = ep.servers[0].url;
}

function goBack() {
  document.getElementById("detailView").style.display = "none";
  document.getElementById("mainView").style.display = "block";
}

loadCategories();

</script>

</body>
</html>
